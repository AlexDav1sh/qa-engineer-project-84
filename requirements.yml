---
functional:
  - Пользователь должен иметь возможность оплатить товар и закрыть форму оплаты +
  - Пользователь должен иметь возможность поиска по строке поиска+
  - Пользователь должен иметь возможность искать товары по ключевому слову.+
  - Пользователь должен иметь возможность искать товары по категориям. +++
  - Пользователь должен иметь возможность фильтровать товары.+
  - Пользователь должен иметь возможность просматривать товары и просматривать подробную информацию о товаре. +
  - Пользователь должен иметь возможность добавлять товары в корзину.+
  - Пользователь должен иметь возможность просматривать содержимое корзины. +
  - Пользователь должен иметь возможность переключить язык интерфейса. +
  - Сайт должен иметь локализацию (перевод) на русский и английский языки. +
  - На странице товара и в каталоге нужно выводить название, рейтинг, цена со скидкой и без нее. Пользователь будет добавлять товар в корзину и продолжать выбирать товары в каталоге.+
  - На странице корзины пользователь cможет удалить товар из корзины, продолжить выбирать товары в каталоге, оформить заказ с переходом на страницу оплаты. Корзина будет хранится в сессии браузера.+
  - Общее отображение товаров в каталоге.+ 
  - Фильтр по производителю.+
  - Фильтр по наличию.+
  - Фильтр по цене.+
  - Проверка работы фильтров вместе.+
  - Добавление нескольких товаров в корзину.+
  - Добавление одинаковых товаров в корзину.+
  - Добавление разных товаров в корзину+_
  - Удаление товара из корзины.+++
  - Очистка корзины.+++
  - Навигация по страницам каталога+
  - На странице товара есть хэштег с переходом в категорию.+
non-functional:
  - Сайт должен быть доступен для пользователей без использования VPN (прямой доступ из сети Интернет)+
  - Сайт нужно разработать с учетом удобства использования и оптимизировать для скорости работы.
  - Сайт должен быть безопасным и защищать данные пользователя.
  - Сайт должен иметь мобильную версию.+
  - Сайт нужно протестировать на работы в разных браузерах (FireFox)+
  - Важно, чтобы сайт мог обрабатывать большое количество трафика.
  - Ключевой возможностью магазина будет адаптивная верстка, чтобы он был удобным на мобильных устройствах. Также магазин будет SPA-приложение, которое не перезагружает страницу. Пользователь будет просматривать каталог товаров, фильтруя их и пользуясь постраничным выводом.
implicit:
  - Сайт должен загрузится за 2 секунды
  - Сайт должен работать при тех. обслуживании
  - Сайт нужно защитить от взлома
