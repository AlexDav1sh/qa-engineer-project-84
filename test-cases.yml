---
- summary: |
     Пользователь должен иметь возможность искать товары по ключевому слову
  requirement: |
    Пользователь при вернном поиске по ключевым словам найдет товар
  prerequisites: |
    Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Ключевое слово - лак
  steps:
    - Открываем строку поиска
    - Вводим искомое слово
  expected-result: |
    Пользователю должен выйти список товаров по его запросу

- summary: |
    Пользователь должен иметь возможность искать товары по категории.
  requirement: |
    Пользователь при вернном поиске в категориях найдет товар 
  prerequisites:
   Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Категория - Шанель
  steps:
    - Открыть сайт
    - Поставить ползунок на против запроса 
  expected-result: |
    Пользователь должен выйти список товаров по его запросу

- summary: |
   Пользователь должен иметь возможность добавлять товары в корзину
  requirement: |
    Пользователь может добовлять товар в карзину 
  prerequisites:
   Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Синия кнопка на карточке товара - Добавить в корзину
  steps:
    - Открыть сайт
    - Нажать на кнопку Добавить в корзину 
  expected-result: |
    У пользователя должнен добавиться товар в корзину

    - summary: |
   Пользователь должен иметь возможность просматривать содержимое корзины
  requirement: |
    Пользователь имеет возможность просмотреть содержимое корзины
  prerequisites:
   Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Верхний правый угол, раздел - Тележка
  steps:
    - Открыть сайт
    - Перейти в Тележку
  expected-result: |
    У пользователя будет список добавленого товара

     - summary: |
   Пользователь должен иметь возможность оформить заказ с переходом на страницу оплаты
  requirement: |
    Пользователь имеет возможность оформить заказ с переходом на страницу оплаты
  prerequisites:
   Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Страница Тележа, оплата товара
  steps:
    - Открыть сайт
    - Перейти в Тележку
    - Кнопка оплаты или подобная
  expected-result: |
    У пользователя будет возможность оплатить товар
