- summary: |
   Пользователь должен иметь возможность оформить заказ с переходом на страницу оплаты
  requirement: |
    Пользователь имеет возможность оформить заказ с переходом на страницу оплаты
  prerequisites:
   Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Страница Тележа, оплата товара
  steps:
    - Перейти в Тележку
    - Кнопка Checkout
  expected-result: |
