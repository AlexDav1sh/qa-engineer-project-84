---
- summary: |
     Пользователь должен иметь возможность искать товары по ключевому слову или категории.
  requirement: |
    Пользователь при вернном поиске по ключевым словам или категориям найдет товар
  prerequisites: |
    Должен быть открыт сайт
  test-data: |
    Ключевое слово - помада, Категория - уход за собой
  steps:
    - Открываем поиск или Категорию
    - Вводим искомое слово
    - Нажимаем кнопку «Далее»
  expected-result: |
    Пользователю должен выйти список предметов по его запросу

- summary: |
    Сайт должен иметь мобильную версию
  requirement: |
    При переходе на сайт с мобильной версией он должен функцианировать корректно 
  prerequisites:
   Открыт сайт в мобильной версии
  test-data: |
    Адрес сайта
  steps:
    - Откыть мобильный браузер
    - Ввести адрес сайта
    - Прохим по ссылке
  expected-result: |
    Пользователь должен попасть на главную страницу мобильного сайта
