---

summary: |
    На странице товара и в каталоге нужно выводить название, рейтинг, цена со скидкой и без нее. Пользователь будет добавлять товар в корзину и продолжать выбирать товары в каталоге.
  requirement: |
    Пользователь сможет добавлять товар в корзину и продолжатьб выбирать товар в каталоге.
  prerequisites: |
    Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    - Страница сайта с товаром
    - Каталог
    - рейтинг
    - цена со скидкой и без нее.
  steps:
    - Страница с товаром
    - Вводим данные в название
    - Вводим данные в рейтинг
    - Вводим данные цены со скидкой и бещ неё
  expected-result: |
    Пользователь сможет добавлять товар в корзину и оставаться в каталоге магазина

- summary: |
    Сайт должен быть доступен для пользователей без использования VPN (прямой доступ из сети Интернет).
  requirement: |
    Пользователь сможет перейти на сайт без включенного VPN
  prerequisites: |
    Должен быть выключен VPN
    Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
   Открыть сайт без включенного VPN
  steps:
    - Отключить VPN
    - Обновить сайт
  expected-result: |
    Пользователь сможет взаимодейстовать с сайтом без включенного VPN

- summary: |
    Пользователь должен иметь возможность просматривать товары и просматривать подробную информацию о товаре.
  requirement: |
    Пользователь сможет просмотреть товар и проверить информацию о товаре
  prerequisites: |
    Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
   Товар на сайте
  steps:
    - Просмотреть нужный товар на сайте
    - Кликнуть на карточку товара  
  expected-result: |
    Пользователь должен увидеть нужный товар на сайте и иметь возможность кликнуть по нему для просмотра информации 

- summary: |
    Сайт должен иметь локализацию  на русский и английский языки.
  requirement: |
    Пользователь при смене языка, поменяет перевод сайта на выбранный им
  prerequisites: |
    Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Ключевое слово - Язык
  steps:
    - Нажмиаем на стрелочку около "Язык"
    - Выбираем нужный из языков "Английский, Русский"  
  expected-result: |
    Пользователь должен первести сайт на выбранный им язык 

- summary: |
     Пользователь должен иметь возможность переключить язык интерфейса.
  requirement: |
    Пользователь при смене языка, поменяет язык интерфейса
  prerequisites: |
    Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Ключевое слово - Язык
  steps:
    - Нажмиаем на стрелочку около "Язык"
    - Выбираем нужный из языков "Английский, Русский, испанский"  
  expected-result: |
    Пользователь должен поменять язык интерфейса

- summary: |
     Пользователь должен иметь возможность фильтровать товары
  requirement: |
    Пользователь при фильтрации по стоимости, найдет нужный товар
  prerequisites: |
    Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Ключевое слово - нужная цена 
  steps:
    - Вводим в От - нужуную стоимость
    - Вводим До - нужную стоиомсть  
  expected-result: |
    Пользователю должен выйти список по ценовой категории 
    
- summary: |
     Пользователь должен иметь возможность искать товары по ключевому слову
  requirement: |
    Пользователь при вернном поиске по ключевым словам найдет товар
  prerequisites: |
    Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Ключевое слово - лак
  steps:
    - Вводим искомое слово в строку поиска
  expected-result: |
    Пользователю должен выйти список товаров по его запросу

- summary: |
    Пользователь должен иметь возможность искать товары по категории.
  requirement: |
    Пользователь при вернном поиске в категориях найдет товар 
  prerequisites:
   Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Категория - Шанель
  steps:
    - Поставить ползунок на против запроса 
  expected-result: |
    Пользователь должен выйти список товаров по его запросу

- summary: |
   Пользователь должен иметь возможность добавлять товары в корзину
  requirement: |
    Пользователь может добовлять товар в карзину 
  prerequisites:
   Должен быть открыт сайт https://products-store.hexlet.app/
  test-data: |
    Синия кнопка на карточке товара - Добавить в корзину
  steps:
    - Нажать на кнопку Добавить в корзину 
  expected-result: |
    У пользователя должнен добавиться товар в корзину

- summary: |
   Пользователь должен иметь возможность просматривать содержимое корзины
  requirement: |
    Пользователь имеет возможность просмотреть содержимое корзины
  prerequisites:
   - Должен быть открыт сайт https://products-store.hexlet.app/
   - В тележке должны быть добавлены товары
  test-data: |
    Верхний правый угол, раздел - Тележка
  steps:
