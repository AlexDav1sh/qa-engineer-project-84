bugreports:
  - summary: |
     Не работает поле поиска
    environment: |
     Версия: 149.0.7827.156 (официальная сборка) (64 бит) 
     ОС Windows
    steps-to-reproduce: |
     1. Зайти на страницу сайта https://products-store.hexlet.app/
     2. Ввести данные поиска в поле Поиска
    expected-result: |
     Должен появится список продукции с данным названием
    actual-result: |
     Появляется надпись Ничего не найдено!

  - summary: |
     Пользователь не имеет возможность оформить заказ с переходом на страницу оплаты
    environment: |
     Версия: 149.0.7827.156 (официальная сборка) (64 бит) 
     ОС Windows
    steps-to-reproduce: |
     1. Зайти на страницу сайта https://products-store.hexlet.app/
     2. Зайти в Тележку
    expected-result: |
     В Тележке должна быть кнопка с оплатой и переходом на форму оплаты
    actual-result: |
     Кнопки для оплаты в разеделе Тележки нет и возможности перейти в форму оплаты
